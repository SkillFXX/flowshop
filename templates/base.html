<!doctype html>
<html lang="fr" data-theme="lofi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow">
    <title>{% block seo_title %}SkillFX Shop{% endblock %}</title>
    <meta name="description" content="{% block seo_description %}Ressources professionnelles pour vos montages vidéo{% endblock %}" />
    <meta name="og:image" property="og:image" content="{% block seo_image %}{% endblock %}" />
    <script defer src="https://umami.flowhost.dev/script.js" data-website-id="25a2dd9d-9eef-49e9-9f63-b46a8fea6c89"></script>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon" />
    <!-- Tailwind CSS with DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <!-- Google Material Icons -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;

        /* Primary (#007bff) */
        --p: 62% 0.21 264;
        --pc: 100% 0 0;

        /* Secondary (gris bleuté subtil) */
        --s: 55% 0.05 240;
        --sc: 100% 0 0;

        /* Accent (bleu plus clair) */
        --a: 70% 0.18 250;
        --ac: 0% 0 0;

        /* Neutres (UI clean) */
        --n: 20% 0.02 260;
        --nc: 98% 0 0;

        /* Background */
        --b1: 98% 0.0 0;
        --b2: 100% 0 0;
        --b3: 94% 0.02 260;
        --bc: 15% 0.02 260;

        /* États */
        --in: 70% 0.15 250;
        --su: 75% 0.18 150;
        --wa: 80% 0.18 85;
        --er: 65% 0.22 25;

        /* UI */
        --border-btn: 1px;
        --tab-border: 1px;

        --rounded-box: 0.75rem;
        --rounded-btn: 0.5rem;
        --rounded-badge: 0.375rem;
        --tab-radius: 0.5rem;

        --animation-btn: 0.2s;
        --animation-input: 0.2s;
        --btn-focus-scale: 0.98;
      }

      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      main {
        flex: 1;
      }
    </style>
  </head>
  <body class="bg-base-200">
    {% from 'components/macros.html' import navbar, footer, flash_messages %} {{
    navbar(session.get('user_id'), session.get('cart', [])|length) }}
    <div class="container mx-auto p-4">{{ flash_messages() }}</div>

    <main class="container mx-auto p-4">{% block content %}{% endblock %}</main>

    {{ footer() }}
  </body>
</html>
